name: H100-GPU-CI

on:
  push:
    branches:
      - main
    paths:
      - 'ci/**'
      - 'skyrl/backends/skyrl_train/**'
      - 'skyrl/train/**'
      - 'tests/backends/skyrl_train/gpu/gpu_ci/**'
      - 'pyproject.toml'
      - '!docs/**'
      - '!examples/**'
      - '.github/workflows/**'
  pull_request_target:
    types: [labeled]
  workflow_dispatch:


permissions:
  checks: write   # for status checks to appear
  contents: read

jobs:

  skyrl_train_tests_h100:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request_target' &&
        !github.event.pull_request.draft &&
        contains(github.event.pull_request.labels.*.name, 'run_h100_gpu_ci')
      )
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true
      - name: Install basic dependencies
        run: uv pip install anyscale==0.26.103 typer==0.9.0
      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base
      - name: GPU tests
        env:
          ANYSCALE_CLI_TOKEN: ${{ secrets.ANYSCALE_CLI_TOKEN }}
          ANYSCALE_HOST: https://console.anyscale.com
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          envsubst < ci/anyscale_gpu_ci_h100.yaml > ci/anyscale_gpu_ci_h100_envsubst.yaml
          COMMIT_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          JOB_NAME="skyrl-train-gpu-ci-h100-${COMMIT_SHA:0:7}-${{ github.run_id }}"
          anyscale job submit -f ci/anyscale_gpu_ci_h100_envsubst.yaml --name "$JOB_NAME" --timeout 5400
          anyscale job wait --cloud sky-anyscale-aws-us-east-1 --name "$JOB_NAME" --timeout 5400
          rm -f ci/anyscale_gpu_ci_h100_envsubst.yaml
